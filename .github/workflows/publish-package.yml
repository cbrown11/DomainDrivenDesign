name: Publish package

# Pushes Cbrown11.DomainDrivenDesign to GitHub Packages (private to the repo unless you change visibility).
# Version from GitVersion (GitVersion.yml). Triggers: push to main, tag v*, release published, manual.

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches:
      - main
    tags:
      - "v*"

concurrency:
  group: publish-package
  cancel-in-progress: false

env:
  DOTNET_VERSION: "10.0.x"
  CONFIGURATION: Release
  PACKAGE_PROJECT: src/DomainDrivenDesign.csproj

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v0.9.7
        with:
          versionSpec: 5.x

      - name: GitVersion
        uses: gittools/actions/gitversion/execute@v0.9.7
        id: gitversion
        with:
          useConfigFile: "true"

      - name: Show version
        run: |
          echo "SemVer: ${{ steps.gitversion.outputs.SemVer }}"
          echo "NuGetVersion: ${{ steps.gitversion.outputs.NuGetVersion }}"
          echo "FullSemVer: ${{ steps.gitversion.outputs.FullSemVer }}"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          source-url: https://nuget.pkg.github.com/cbrown11/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_READ_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Restore
        run: dotnet restore DomainDrivenDesign.sln

      - name: Build
        run: dotnet build DomainDrivenDesign.sln -c ${{ env.CONFIGURATION }} --no-restore

      - name: Test
        run: dotnet test DomainDrivenDesign.sln -c ${{ env.CONFIGURATION }} --no-build --verbosity normal

      - name: Pack
        shell: bash
        run: |
          out="${{ github.workspace }}/artifacts"
          dotnet pack ${{ env.PACKAGE_PROJECT }} -c ${{ env.CONFIGURATION }} --no-build -o "$out" \
            -p:Version='${{ steps.gitversion.outputs.NuGetVersion }}' \
            -p:PackageVersion='${{ steps.gitversion.outputs.NuGetVersion }}'

      # Do not `dotnet nuget add source` here: the feed URL is already present (repo nuget.config + setup-dotnet), and a second add fails with "already been added".
      - name: Push to GitHub Packages
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --skip-duplicate
